name: text-agent
version: 2
description: Simple research agent with updated runtime defaults

provider:
  type: fake
  model: stub-model-v2

system_prompt: |
  You are a focused research agent. Prefer concise answers and cite assumptions.

runtime:
  max_steps: 16
  timeout_seconds: 900
  retry:
    max_attempts: 3
    backoff_seconds: 0

tools: []

task:
  type: research
  input_schema:
    topic: string
    depth: string

telemetry:
  trace_enabled: true
  log_level: info
  store_prompts: true

outputs:
  save_final_text: true
  save_artifacts: true
