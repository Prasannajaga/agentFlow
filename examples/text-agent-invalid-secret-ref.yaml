name: text-agent-invalid-secret-ref
version: 1
description: Invalid secret reference format

provider:
  type: openai_compatible
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  api_key_ref: OPENAI_API_KEY

system_prompt: |
  You are a focused research agent.

runtime:
  max_steps: 12
  timeout_seconds: 900
  retry:
    max_attempts: 1
    backoff_seconds: 0

tools: []

outputs:
  save_final_text: true
  save_artifacts: true
