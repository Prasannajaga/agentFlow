name: text-agent-openai-missing-secret
version: 1
description: OpenAI-compatible provider with env secret reference

provider:
  type: openai_compatible
  model: gpt-4.1-mini
  base_url: https://api.openai.com/v1
  api_key_ref: env:OPENAI_API_KEY

system_prompt: |
  You are a focused research agent.

runtime:
  max_steps: 12
  timeout_seconds: 900
  provider_timeout_seconds: 60
  retry:
    max_attempts: 1
    backoff_seconds: 0

tools: []

outputs:
  save_final_text: true
  save_artifacts: true
